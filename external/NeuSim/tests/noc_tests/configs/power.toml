width = 128
leakage = 2.75e-3
dynamic = 8.0e-13

# Router Routing Logic
# 对应 YAML: Dictionary { static, dynamic }
[energy.router.routing]
default        = { static = 1.20e-4, dynamic = 6.00e-14 }
XY             = { static = 1.20e-4, dynamic = 6.00e-14 }
DYAD           = { static = 1.35e-4, dynamic = 6.75e-14 }
NEGATIVE_FIRST = { static = 1.28e-4, dynamic = 6.30e-14 }
NORTH_LAST     = { static = 1.28e-4, dynamic = 6.30e-14 }
DELTA          = { static = 1.28e-4, dynamic = 6.30e-14 }
WEST_FIRST     = { static = 1.28e-4, dynamic = 6.30e-14 }
ODD_EVEN       = { static = 1.32e-4, dynamic = 6.60e-14 }
TABLE_BASED    = { static = 2.40e-4, dynamic = 12.00e-14 }

# Router Selection (Arbitration)
[energy.router.selection]
default = { static = 1.10e-4, dynamic = 5.00e-14 }
XY      = { static = 1.10e-4, dynamic = 5.00e-14 }
DYAD    = { static = 1.23e-4, dynamic = 5.89e-14 }
