# Router Crossbar
# 对应 YAML: [PortNum, FlitSize, Leakage, Dynamic]
[[energy.router.crossbar]]
ports = 5
width = 16
leakage = 3.78e-4
dynamic = 1.20e-13
[[energy.router.crossbar]]
ports = 5
width = 32
leakage = 7.49e-4
dynamic = 2.21e-13
[[energy.router.crossbar]]
