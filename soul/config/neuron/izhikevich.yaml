tau: 2.0                    # (float) membrane time constant
v_c: 0.8                    # (float) parameter v_c
a0: 1.0                     # (float) parameter a0
v_threshold: 1.0            # (float) firing threshold for neuron
v_reset: 0.0                # (float) reset value for membrane potential
v_rest: -0.1                # (float) resting membrane potential
w_rest: 0.0                 # (float) resting adaptation variable
tau_w: 2.0                  # (float) adaptation time constant
a: 0.0                      # (float) parameter a
b: 0.0                      # (float) parameter b
surrogate: sigmoid          # (str) surrogate gradient function
detach_reset: false         # (bool) whether to detach reset from computation graph
step_mode: m                # (str) step mode, 'm' for multi-step, 's' for single-step
store_v_seq: false          # (bool) whether to store membrane potential sequence
